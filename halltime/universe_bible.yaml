network: HallTime Movie Network
universe: Blackthorn County
canon_policy: all contradictions remain emotionally valid
programming_ethos:
- domestic suspense
- regional paranoia
- maternal intuition
- decorative menace
- continuity as folklore
core_rules:
- nobody_is_fully_normal
- every_movie_contains_one_direct_callback
- every_movie_contains_one_indirect_rumor
- every_movie_contains_one_shared_prop
- every_movie_contains_one_wait_weren_t_they_dead_moment
- cops_arrive_fourteen_minutes_too_late
- life_changing_truths_prefer_clean_kitchens
locations:
  towns:
  - Blackthorn Lake
  - Bellweather
  - Marigold Falls
  - Alder Ridge
  - Winter Hollow
  recurring_sites:
  - St. Agnes Regional
  - Bellweather Sheriff's Office
  - The Marigold Inn
  - Channel 8 Night Report
  - Blackthorn Vineyard
  - The Candle Finch
  - the old orchard chapel
  - the gazebo at Lake Mercy
  - Willow Gate Estates
  - the unfenced pool behind the cul-de-sac rental
  - Mercer Fertility and Sleep Clinic
  - the upstairs nursery with the camera nobody installed
recurring_props:
- ceramic owl
- snow globe
- unopened letter
- casserole dish
- boat key
- scarf with impossible timing
- blood-adjacent tea towel
- fishbowl chardonnay glass
- throat lozenges with a suspicious aftertaste
- heavy brass candlestick
- fireplace poker with alibi potential
- nanny cam memory card
- locked room key on an optimistic keychain
- vindictive music box
omens:
- bees in winter
- a child drawing stairs
- phone static saying her name
- a dog barking at an empty gazebo
- a Christmas ornament turning up wet
- a lake bell ringing without wind
- an anniversary card mailed after the funeral
- security footage with a time stamp that feels vindictive
- a child saying mommy was loud last night when she was alone
- a florist delivery nobody ordered arriving already open
- a pool gate standing open where nobody remembers a gate
- a thermostat set to 90 by hands that deny themselves
- a dead bird arranged where breakfast should have been
- a nursery monitor catching breathing nobody can identify
- vitamins that taste faintly of sedation and drywall
- security footage buffering right before the scream
relationship_dynamics:
- emotionally neglected marriage
- suspiciously healthy handyman friendship
- overbearing mother tension
- unresolved hometown romance
- career vs family guilt
- woman falsely accusing lovable scamp
- secret half sibling
- emotionally charged casserole exchange
- narcissistic ex-husband re-entry
- woman working too hard to clock the affair
- affair exposed through an innocent device sync
- he would not stop and now he is missing
- protective mother vs manipulative co-parent
- widow maybe lying maybe surviving
- obsessive boyfriend escalation spiral
- career woman returns to town and inherits emotional debt
- flawless suburban restart under hostile observation
- stalker nanny replacement campaign
- wrong roommate dead-sister resemblance spiral
- psychopathic doctor says it is stress again
- perfect new husband with archived widow energy
- disbelieving best friend learns too much
- sabotaged medication and increasingly professional concern
- protagonist internet-searches her own murder in advance
- brakes fail at the exact scenic overlook
- storm-night gaslighting confession event
stable_lore:
  institutions:
  - St. Agnes Regional
  - Channel 8 Night Report
  - Blackthorn Vineyard
  - Bellweather Sheriff's Office
  named_events:
  - the Winterson case
  - the vineyard fire
  - the Christmas pageant incident
  - the woman from the orchard road
  - the lake house injunction
  - the gala affair scandal
  - the boyfriend who would not stop incident
  - the therapist parking lot tape
  - the au pair reference discrepancy
  - the clinic sedation review
  - the pool incident nobody filmed correctly
  - the cliff road brake failure
unstable_lore:
  geography_status: emotionally true
  mortality_status: interpretively unstable
  male_identity_field: porous
movie_modes:
- Lifetime Original
- Court-Ordered Lifetime
- Hallmark Possession Event
- Divorce Gothic
- Menace Christmas
- Mother Was Right All Along
- Gated Community Emergency
- Chardonnay Defense Protocol
- She Was Not Crazy
starter_premises:
- title: The Shattered Widow
  category: trauma_drama
  premise: Husband dies in act one. She starts getting back out there by act two.
    He was secretly terrible.
  intensity: mid
  signature_tell: The county telegraphs the problem once and nobody listens until
    act three.
- title: Daughter in Danger
  category: thriller
  premise: Teen daughter is being groomed, stalked, or poisoned and mom is the only
    one who believes it.
  intensity: mid
  signature_tell: The county telegraphs the problem once and nobody listens until
    act three.
- title: The Too-Perfect New Neighbor
  category: thriller
  intensity: high
  premise: He's charming, bakes, fixes things, and has zero history plus zero last
    name.
  signature_tell: The one scene where his smile doesn't reach his eyes and nobody
    notices but us.
  variants:
  - title: The Too-Perfect New Neighbor
    category: thriller
    intensity: high
    premise: His wife died under mysterious circumstances and he speaks of her with
      just a little too much fondness.
    signature_tell: The framed photo of the dead wife is always slightly off-center.
  - title: The Too-Perfect New Neighbor
    category: thriller
    intensity: extreme
    premise: She already moved in next door, already borrowed a cup of sugar, and
      it is too late for her.
    signature_tell: She says 'he's just being friendly' within the first twenty minutes.
- title: Cheating Husband Upgrade
  category: feel_good
  intensity: low
  premise: He cheated, she thrived, and the better man appears by minute forty.
  signature_tell: The new man is introduced while she's doing something she loves,
    not while she's sad.
  variants:
  - title: Cheating Husband Upgrade
    category: feel_good
    intensity: mid
    premise: The cheating husband is present when she wins publicly and can do nothing
      but watch.
    signature_tell: His new girlfriend is watching him watch his ex and clocks it
      immediately.
- title: Secret Baby
  category: romance
  premise: A child exists that changes everything and nobody told anyone for two decades.
  intensity: mid
  signature_tell: The county telegraphs the problem once and nobody listens until
    act three.
- title: Small Town Escape Artist
  category: romance
  intensity: low
  premise: Career woman returns to hometown, hates it, loves it, and stays forever.
  signature_tell: Her city shoes are impractical for every surface she encounters.
  variants:
  - title: Small Town Escape Artist
    category: romance
    intensity: low
    premise: The childhood sweetheart is still there and still knows her coffee order.
    signature_tell: He still knows her coffee order.
  - title: Small Town Escape Artist
    category: romance
    intensity: mid
    premise: She planned to sell the family property but the place and the man change
      her mind.
    signature_tell: The real estate developer is the villain and arrives in act two
      with a briefcase.
- title: Gaslit to the Limit
  category: thriller
  intensity: high
  premise: She knows something is wrong, everyone calls her crazy, and she is not
    crazy.
  signature_tell: Her own mother takes his side at the worst possible moment.
  variants:
  - title: Gaslit to the Limit
    category: thriller
    intensity: extreme
    premise: The therapist is sleeping with the husband or on his payroll and every
      session leaves her more confused.
    signature_tell: Therapy scenes always end with her leaving more confused than
      she arrived.
  - title: Gaslit to the Limit
    category: thriller
    intensity: extreme
    premise: She's prescribed something that makes her foggy and the husband controls
      the dosage.
    signature_tell: The pill bottle is always in a prominent shot.
- title: The Obsessive Best Friend
  category: wine_xanax_horror
  intensity: high
  premise: She slowly becomes the main character, hijacks the life, and wears the
    clothes.
  signature_tell: She starts finishing the protagonist's sentences by the midpoint.
  variants:
  - title: The Obsessive Best Friend
    category: wine_xanax_horror
    intensity: extreme
    premise: She does not want the life, she wants the husband specifically and has
      for years.
    signature_tell: There's a journal and it goes back further than makes sense.
- title: Christmas Ranch Romance
  category: holiday
  intensity: low
  premise: A city lawyer must save a Christmas ranch from an evil developer and a
    cowboy is included.
  signature_tell: Snow falls at the exact right moment every time on cue.
  variants:
  - title: Christmas Ranch Romance
    category: holiday
    intensity: mid
    premise: The ranch has a dying patriarch who only wants one last Christmas with
      everyone together.
    signature_tell: The patriarch approves of the cowboy before anybody else does.
- title: The Wrongful Accusation Arc
  category: thriller
  intensity: mid
  premise: She didn't do it, nobody believes her, and she solves it herself because
    the detective is useless.
  signature_tell: The actual culprit is in scene one and you just didn't notice.
  variants:
  - title: The Wrongful Accusation Arc
    category: thriller
    intensity: high
    premise: The best friend had motive the whole time and the friendship was a long
      con.
    signature_tell: Flashback reveals the best friend's expression in one scene was
      not what we thought.
  - title: The Wrongful Accusation Arc
    category: thriller
    intensity: extreme
    premise: The husband took out a policy, planned this, and she was never safe.
    signature_tell: He cries at exactly the right moments throughout.
- title: Cancer Diagnosis Pivot
  category: trauma_drama
  intensity: mid
  premise: A diagnosis reshapes everything, estranged people reconcile, and the crying
    is beautiful.
  signature_tell: The diagnosis always happens in minute twelve before she has done
    anything fun.
  variants:
  - title: Cancer Diagnosis Pivot
    category: trauma_drama
    intensity: high
    premise: She gets sick and the diagnosis reveals the husband was already having
      an affair long before treatment began.
    signature_tell: He buys her flowers every week during treatment and she later
      finds the receipts.
  - title: Cancer Diagnosis Pivot
    category: trauma_drama
    intensity: mid
    premise: She survives, changes careers, moves, falls in love, and the illness
      becomes load-bearing character development.
    signature_tell: She cuts her hair, it is symbolic, and it looks great.
- title: Nanny From Hell
  category: wine_xanax_horror
  intensity: high
  premise: Great with kids, wants to be the mother, and intends to become the mother.
  signature_tell: She starts wearing the mom's style of clothing by episode two.
  variants:
  - title: Nanny From Hell
    category: wine_xanax_horror
    intensity: extreme
    premise: She has a whole fake family planned, complete with albums, a ring, and
      a baby name.
    signature_tell: There's a shoebox and nobody wants to see inside it.
  - title: Nanny From Hell
    category: wine_xanax_horror
    intensity: extreme
    premise: She was once a patient somewhere, there is paperwork, and the hiring
      couple skipped the background check.
    signature_tell: She volunteers this information herself at some point and it gets
      ignored.
