  intimacy_parasite:
    effect: colonizes trust before making a move
    compatible_families: [seductive_deceiver, chaos_psychopath, corporate_predator, rogue_ai]
    texture: closeness as attack surface
  collapse_prophet:
    effect: welcomes disaster because it proves the worldview
    compatible_families: [mastermind, chaos_psychopath, rogue_ai, monstrous_other]
    texture: vindication hunger
  optimization_addict:
    effect: treats human cost as a smoothing problem
    compatible_families: [rogue_ai, corporate_predator, hubristic_creator]
    texture: metrics over meaning
  inherited_heir:
    effect: claims entitlement through lineage or prior ownership
    compatible_families: [mastermind, corporate_predator, seductive_deceiver]
    texture: old power with updated packaging
