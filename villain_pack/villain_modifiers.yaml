  grieving_zealot:
    effect: turns private loss into public doctrine
    compatible_families: [mastermind, hubristic_creator, institutional_enforcer, monstrous_other]
    texture: pain converted into permission
  performance_genius:
    effect: uses charisma and spectacle to cover mediocrity or fraud
    compatible_families: [mastermind, corporate_predator, seductive_deceiver]
    texture: branding louder than competence
  bureaucratic_sadist:
    effect: enjoys punishment through procedure
    compatible_families: [institutional_enforcer, corporate_predator]
